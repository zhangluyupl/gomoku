<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      /* 宣纸色底，淡淡的墨色渐变 */
      background-color: #f5f0e8;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(180,150,100,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(139,105,20,0.05) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'STKaiti', 'KaiTi', '楷体', '楷体_GB2312', 'Noto Serif SC', serif;
      padding: 16px;
      overflow-x: hidden;
    }

    /* 印章装饰线 */
    .title-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .seal {
      width: 36px;
      height: 36px;
      border: 2px solid #c0392b;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #c0392b;
      font-weight: bold;
      font-family: 'STKaiti', serif;
      letter-spacing: 0;
      transform: rotate(-5deg);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: normal;
      color: #2c2c2c;
      letter-spacing: 12px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
    }

    /* Mode selector */
    #mode-select {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .mode-btn {
      padding: 8px 24px;
      border: 1px solid #8b7355;
      background: rgba(245,240,232,0.9);
      border-radius: 2px;
      cursor: pointer;
      font-size: 15px;
      font-family: 'STKaiti', serif;
      color: #5a4a3a;
      transition: all 0.2s;
      letter-spacing: 2px;
    }
    .mode-btn.active {
      background: #5a3825;
      color: #f5f0e8;
      border-color: #5a3825;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }
    .mode-btn:hover:not(.active) {
      background: rgba(90,58,37,0.1);
    }

    /* Difficulty */
    #diff-select {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }
    .diff-btn {
      padding: 4px 14px;
      border: 1px solid #8b7355;
      background: transparent;
      border-radius: 2px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'STKaiti', serif;
      color: #8b7355;
      letter-spacing: 1px;
    }
    .diff-btn.active {
      background: #8b7355;
      color: #f5f0e8;
    }

    /* Status */
    #status {
      font-size: clamp(16px, 4vw, 22px);
      margin-bottom: 10px;
      color: #5a3825;
      letter-spacing: 3px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
    }

    /* Scores */
    #scores {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
      font-size: 15px;
      color: #5a3825;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 1px;
    }
    .score-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 1px solid #8b7355;
    }
    .score-dot.black { background: radial-gradient(circle at 35% 35%, #4a4a4a, #0a0a0a); }
    .score-dot.white { background: radial-gradient(circle at 35% 35%, #f5f5f0, #d0d0c8); }

    /* Board wrapper — 木盒效果 */
    #board-wrapper {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      /* 木盒外框 */
      box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        0 0 0 8px #6b4423,
        0 0 0 10px #4a2f17,
        0 0 0 12px #3a2410;
      background: #5a3825;
      padding: 8px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      /* 棋盘木色 */
      background-color: #d4a853;
      background-image:
        linear-gradient(rgba(90,56,37,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,56,37,0.5) 1px, transparent 1px);
      background-size: calc(100% / 14) calc(100% / 14);
      width: min(92vw, 520px);
      height: min(92vw, 520px);
      cursor: pointer;
      border: 1px solid rgba(90,56,37,0.3);
    }

    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 星位点 */
    .cell.star::after {
      content: '';
      position: absolute;
      width: 8%;
      height: 8%;
      background: rgba(90,56,37,0.7);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    /* 棋子 */
    .piece {
      width: 88%;
      height: 88%;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.35);
      z-index: 2;
      transition: transform 0.15s;
      position: relative;
    }
    .piece:hover { transform: scale(1.1); }

    .piece.black { background: radial-gradient(circle at 35% 35%, #4a4a4a, #0a0a0a); }
    .piece.white { background: radial-gradient(circle at 35% 35%, #f5f5f0, #d0d0c8); }

    .piece.last::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 110%; height: 110%;
      border: 2px solid #c0392b;
      border-radius: 50%;
      animation: lastPulse 1.2s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes lastPulse {
      from { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); }
      to { opacity: 0.9; transform: translate(-50%, -50%) scale(1.05); }
    }

    .piece.win-piece {
      animation: winPulse 0.8s ease-in-out infinite alternate;
      z-index: 5;
    }
    @keyframes winPulse {
      from { transform: scale(1); box-shadow: 2px 2px 5px rgba(0,0,0,0.35); }
      to { transform: scale(1.15); box-shadow: 0 0 12px rgba(192,57,43,0.6); }
    }
    .piece.thinking {
      animation: think 0.6s ease-in-out infinite alternate;
    }
    @keyframes think {
      from { opacity: 0.4; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Win stars burst — 换成中式元素 */
    #win-stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }
    .star-burst {
      position: absolute;
      font-size: 24px;
      animation: starFly 1.2s ease-out forwards;
    }
    @keyframes starFly {
      0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(180deg); opacity: 0; }
    }

    /* Controls */
    #controls {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }
    .ctrl-btn {
      padding: 9px 28px;
      font-size: 14px;
      font-family: 'STKaiti', serif;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
    }
    #undo-btn {
      background: transparent;
      color: #5a3825;
      border: 1px solid #8b7355;
    }
    #undo-btn:not(:disabled):hover {
      background: rgba(139,115,85,0.15);
    }
    #undo-btn:disabled { opacity: 0.35; cursor: default; }

    #reset-btn {
      background: #5a3825;
      color: #f5f0e8;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }
    #reset-btn:hover { background: #4a2f17; transform: translateY(-1px); }

    /* History */
    #history {
      margin-top: 10px;
      font-size: 12px;
      color: #8b7355;
      text-align: center;
      max-height: 36px;
      overflow: hidden;
      letter-spacing: 1px;
    }

    /* 中式纸飘效果（代替彩色纸屑） */
    .confetti {
      position: fixed;
      width: 8px;
      height: 12px;
      background: #c0392b;
      border-radius: 1px;
      animation: paperFall 3.5s ease-out forwards;
      pointer-events: none;
      z-index: 999;
      opacity: 0.8;
    }
    @keyframes paperFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 26px; letter-spacing: 8px; }
      .mode-btn { padding: 6px 16px; font-size: 13px; }
      #board-wrapper { padding: 6px; }
      #board { width: 94vw; height: 94vw; }
    }
  </style>
</head>
<body>

<div class="title-wrapper">
  <div class="seal">棋</div>
  <h1>五子棋</h1>
  <div class="seal" style="transform:rotate(3deg)">乐</div>
</div>

<div id="mode-select">
  <button class="mode-btn active" data-mode="pvp">双人博弈</button>
  <button class="mode-btn" data-mode="pve">人机对弈</button>
</div>

<div id="diff-select">
  <button class="diff-btn" data-level="1">初</button>
  <button class="diff-btn active" data-level="2">中</button>
  <button class="diff-btn" data-level="3">高</button>
</div>

<div id="status">⚫黑棋先行</div>

<div id="scores">
  <div class="score-item">⚫黑: <span id="score-black">0</span></div>
  <div class="score-item">⚪白: <span id="score-white">0</span></div>
</div>

<div id="board-wrapper">
  <div id="board"></div>
  <div id="win-stars"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="undo-btn" disabled>悔 棋</button>
  <button class="ctrl-btn" id="reset-btn">重 开</button>
</div>

<div id="history"></div>

<script>
  const SIZE = 15;
  const EMPTY = 0, BLACK = 1, WHITE = 2;
  const STARS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];

  let board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(EMPTY));
  let currentPlayer = BLACK;
  let gameOver = false;
  let vsAI = false;
  let aiLevel = 2;
  let scores = (() => {
    try { return JSON.parse(localStorage.getItem('gomoku_scores')) || {[BLACK]:0,[WHITE]:0}; }
    catch { return {[BLACK]:0,[WHITE]:0}; }
  })();
  let history = [];
  let lastMove = null;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const modeBtns = document.querySelectorAll('.mode-btn');
  const diffBtns = document.querySelectorAll('.diff-btn');
  const diffSelect = document.getElementById('diff-select');
  const undoBtn = document.getElementById('undo-btn');
  const resetBtn = document.getElementById('reset-btn');
  const historyEl = document.getElementById('history');
  const winStarsEl = document.getElementById('win-stars');
  const scoreBlackEl = document.getElementById('score-black');
  const scoreWhiteEl = document.getElementById('score-white');

  function init() {
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (STARS.some(([sr,sc]) => sr===r && sc===c)) cell.classList.add('star');
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', () => handleClick(r, c));
        boardEl.appendChild(cell);
      }
    }
  }

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      vsAI = btn.dataset.mode === 'pve';
      diffSelect.style.display = vsAI ? 'flex' : 'none';
      resetGame();
    });
  });

  diffBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      diffBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      aiLevel = parseInt(btn.dataset.level);
    });
  });

  function handleClick(r, c) {
    if (gameOver || board[r][c] !== EMPTY) return;
    if (vsAI && currentPlayer === WHITE) return;
    placePiece(r, c);
    if (!gameOver && vsAI && currentPlayer === WHITE) {
      // 简单难度多等一会，显得更像"在想"
      const delay = aiLevel === 1 ? 500 + Math.random() * 500 : 300;
      aiTimeoutId = setTimeout(aiMove, delay);
    }
  }

  function placePiece(r, c, isAI = false) {
    board[r][c] = currentPlayer;
    history.push({r, c, player: currentPlayer});
    lastMove = {r, c};

    const idx = r * SIZE + c;
    const cell = boardEl.children[idx];
    const piece = document.createElement('div');
    piece.className = `piece ${currentPlayer === BLACK ? 'black' : 'white'}`;
    if (isAI) piece.classList.add('thinking');
    cell.appendChild(piece);

    // 移除其他 thinking 状态
    document.querySelectorAll('.piece.thinking').forEach(p => {
      if (p !== piece) p.classList.remove('thinking');
    });
    // AI 的 thinking 棋子在 600ms 后自动消失（配合 AI 思考动画）
    if (isAI) {
      setTimeout(() => piece.classList.remove('thinking'), 600);
    }

    // Highlight last move
    document.querySelectorAll('.piece.last').forEach(p => p.classList.remove('last'));
    piece.classList.add('last');

    updateHistory();
    updateUndoBtn();

    if (checkWin(r, c)) {
      gameOver = true;
      scores[currentPlayer]++;
      updateScores();
      const name = currentPlayer === BLACK ? '⚫黑棋' : '⚪白棋';
      statusEl.textContent = `${name}胜！`;
      drawWinLine(r, c);
      highlightWinPieces(r, c);
      burstStars(r, c);
      spawnConfetti();
      return;
    }

    if (isFull()) {
      gameOver = true;
      statusEl.textContent = '平局! 🤝';
      return;
    }

    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
    const playerName = currentPlayer === BLACK ? '⚫黑棋' : '⚪白棋';
    statusEl.textContent = vsAI
      ? (currentPlayer === BLACK ? '请落子' : '电脑落子中...')
      : `${playerName}落子`;
  }

  function checkWin(r, c) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let count = 1;
      for (let i = 1; i < 5; i++) {
        const nr=r+dr*i, nc=c+dc*i;
        if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===currentPlayer) count++;
        else break;
      }
      for (let i = 1; i < 5; i++) {
        const nr=r-dr*i, nc=c-dc*i;
        if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===currentPlayer) count++;
        else break;
      }
      if (count >= 5) return true;
    }
    return false;
  }

  function getWinCells(r, c) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let cells = [[r,c]];
      for (let i=1;i<5;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===currentPlayer)cells.push([nr,nc]);else break;}
      for (let i=1;i<5;i++){const nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===currentPlayer)cells.push([nr,nc]);else break;}
      if(cells.length>=5)return cells;
    }
    return null;
  }

  function drawWinLine(r, c) {
    const cells = getWinCells(r, c);
    if (!cells) return;
    const boardRect = boardEl.getBoundingClientRect();
    const cellSize = boardRect.width / SIZE;
    const [r1,c1] = cells[0], [r2,c2] = cells[cells.length-1];
    const x1 = c1 * cellSize + cellSize/2;
    const y1 = r1 * cellSize + cellSize/2;
    const x2 = c2 * cellSize + cellSize/2;
    const y2 = r2 * cellSize + cellSize/2;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.style.cssText = `position:absolute;top:0;left:0;width:${boardRect.width}px;height:${boardRect.height}px;z-index:10;pointer-events:none;overflow:visible`;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#c0392b');
    line.setAttribute('stroke-width','5');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('filter','drop-shadow(0 0 8px rgba(192,57,43,0.7))');
    svg.appendChild(line);
    document.getElementById('board-wrapper').appendChild(svg);
  }

  function highlightWinPieces(r, c) {
    const cells = getWinCells(r, c);
    if (!cells) return;
    cells.forEach(([rr,cc]) => {
      const idx = rr * SIZE + cc;
      const piece = boardEl.children[idx].querySelector('.piece');
      if (piece) piece.classList.add('win-piece');
    });
  }

  function burstStars(r, c) {
    const emojis = ['✨','🌟','💫','🎋','🎍','☘️'];
    for (let i = 0; i < 12; i++) {
      const star = document.createElement('div');
      star.className = 'star-burst';
      star.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const angle = (i / 12) * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      star.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
      star.style.setProperty('--dy', `${Math.sin(angle)*dist}px`);
      star.style.left = '50%';
      star.style.top = '50%';
      winStarsEl.appendChild(star);
    }
    setTimeout(() => winStarsEl.innerHTML = '', 1500);
  }

  function spawnConfetti() {
    // 朱红、鎏金、墨色、藏青 — 四种中式色调
    const colors = ['#c0392b','#d4a853','#2c3e50','#1a5276','#884a0a','#7d3c98'];
    for (let i = 0; i < 30; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = colors[Math.floor(Math.random()*colors.length)];
      conf.style.animationDelay = Math.random() * 0.5 + 's';
      conf.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 3500);
    }
  }

  // ============ AI ============
  let aiTimeoutId = null;

  function aiMove() {
    if (gameOver) return;
    const move = findBestMove(aiLevel);
    if (move && !gameOver) placePiece(move.r, move.c, true);
  }

  function findBestMove(level) {
    const candidates = getCandidateMoves();
    if (!candidates.length) {
      const c = Math.floor(SIZE/2);
      candidates.push({r:c,c});
    }

    if (level === 1) {
      const scored = candidates.map(p => ({...p, s: evaluatePos(p.r,p.c,WHITE)}));
      scored.sort((a,b)=>b.s-a.s);
      const top = scored.slice(0,3);
      return top[Math.floor(Math.random()*top.length)];
    }

    const scored = candidates.map(p => ({...p, s: evaluatePos(p.r,p.c,WHITE)}));
    scored.sort((a,b)=>b.s-a.s);
    const top = scored.slice(0, level===2?5:7);

    let best = top[0], bestScore = -Infinity;
    for (const cand of top) {
      const sim = board.map(r=>[...r]);
      sim[cand.r][cand.c] = WHITE;
      const score = minimax(sim, level===2?2:3, -Infinity, Infinity, false);
      if (score > bestScore) { bestScore = score; best = cand; }
    }
    return best;
  }

  function getCandidateMoves() {
    const moves = [], visited = new Set();
    for (let r=0;r<SIZE;r++) {
      for (let c=0;c<SIZE;c++) {
        if (board[r][c] !== EMPTY) {
          for (let dr=-2;dr<=2;dr++) for (let dc=-2;dc<=2;dc++) {
            const nr=r+dr, nc=c+dc;
            if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===EMPTY) {
              const k=`${nr},${nc}`;
              if (!visited.has(k)) { visited.add(k); moves.push({r:nr,c:nc}); }
            }
          }
        }
      }
    }
    return moves;
  }

  function scoreLine(board, r, c, dr, dc, player) {
    let count=0, open=0, blocks=0;
    for(let i=1;i<=4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){blocks++;break;}if(board[nr][nc]===player)count++;else if(board[nr][nc]===EMPTY){open++;break;}else{blocks++;break;}}
    for(let i=1;i<=4;i++){const nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){blocks++;break;}if(board[nr][nc]===player)count++;else if(board[nr][nc]===EMPTY){open++;break;}else{blocks++;break;}}
    if(blocks===2)return 0;
    const m={5:100000,4:open>=1?10000:5000,3:open>=2?5000:open>=1?500:100,2:open>=2?200:open>=1?50:10};
    return m[count]||0;
  }

  function evaluatePos(r, c, player) {
    let score = 0;
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (const [dr,dc] of dirs) score += scoreLine(board, r, c, dr, dc, player);
    return score;
  }

  function minimax(sim, depth, alpha, beta, isMax) {
    if (depth===0) return evalBoard(sim);
    const moves = getCandSim(sim);
    if (!moves.length) return evalBoard(sim);
    const scored = moves.map(p=>({...p,s:evalBoardAt(sim,p.r,p.c,isMax?WHITE:BLACK)}));
    scored.sort((a,b)=>isMax?b.s-a.s:a.s-b.s);
    const search = scored.slice(0, isMax?4:5);

    if (isMax) {
      let max=-Infinity;
      for (const m of search) {
        sim[m.r][m.c]=WHITE;
        const sc=minimax(sim,depth-1,alpha,beta,false);
        sim[m.r][m.c]=EMPTY;
        max=Math.max(max,sc); alpha=Math.max(alpha,sc);
        if(beta<=alpha)break;
      }
      return max;
    } else {
      let min=Infinity;
      for (const m of search) {
        sim[m.r][m.c]=BLACK;
        const sc=minimax(sim,depth-1,alpha,beta,true);
        sim[m.r][m.c]=EMPTY;
        min=Math.min(min,sc); beta=Math.min(beta,sc);
        if(beta<=alpha)break;
      }
      return min;
    }
  }

  function getCandSim(sim) {
    const moves = [], visited = new Set();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (sim[r][c] !== EMPTY) {
          for (let dr = -2; dr <= 2; dr++) {
            for (let dc = -2; dc <= 2; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && sim[nr][nc] === EMPTY) {
                const key = nr + ',' + nc;
                if (!visited.has(key)) {
                  visited.add(key);
                  moves.push({ r: nr, c: nc });
                }
              }
            }
          }
        }
      }
    }
    return moves;
  }

  function evalBoard(sim) {
    let score=0;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
      if(sim[r][c]===WHITE) score+=scoreLine(sim,r,c,1,0,WHITE)+scoreLine(sim,r,c,0,1,WHITE)+scoreLine(sim,r,c,1,1,WHITE)+scoreLine(sim,r,c,1,-1,WHITE);
      else if(sim[r][c]===BLACK) score-=scoreLine(sim,r,c,1,0,BLACK)+scoreLine(sim,r,c,0,1,BLACK)+scoreLine(sim,r,c,1,1,BLACK)+scoreLine(sim,r,c,1,-1,BLACK);
    }
    return score;
  }

  function evalBoardAt(sim,r,c,player) {
    return scoreLine(sim,r,c,1,0,player)+scoreLine(sim,r,c,0,1,player)+scoreLine(sim,r,c,1,1,player)+scoreLine(sim,r,c,1,-1,player);
  }

  // ============ Helpers ============
  function isFull() { return board.every(row=>row.every(v=>v!==EMPTY)); }

  function updateHistory() {
    historyEl.innerHTML = history.map((h,i)=>
      `<span style="margin:0 5px">${i+1}.${h.player===BLACK?'⚫':'⚪'}</span>`
    ).join('');
  }

  function updateUndoBtn() { undoBtn.disabled = history.length===0 || gameOver; }
  function updateScores() { scoreBlackEl.textContent=scores[BLACK]; scoreWhiteEl.textContent=scores[WHITE]; localStorage.setItem('gomoku_scores', JSON.stringify(scores)); }

  function undo() {
    if (!history.length || gameOver) return;
    const toUndo = vsAI && history.length>=2 ? 2 : 1;
    for (let i=0;i<toUndo;i++) {
      const last=history.pop();
      board[last.r][last.c]=EMPTY;
      const idx=last.r*SIZE+last.c;
      boardEl.children[idx].innerHTML='';
    }
    lastMove=history.length?history[history.length-1]:null;
    document.querySelectorAll('.piece.last').forEach(p=>p.classList.remove('last'));
    if(lastMove){
      const idx=lastMove.r*SIZE+lastMove.c;
      boardEl.children[idx].querySelector('.piece')?.classList.add('last');
    }
    currentPlayer=lastMove?lastMove.player:BLACK;
    gameOver=false;
    if (aiTimeoutId) { clearTimeout(aiTimeoutId); aiTimeoutId = null; }
    const svg=document.querySelector('#board-wrapper>svg');
    if(svg)svg.remove();
    const name=currentPlayer===BLACK?'⚫黑棋':'⚪白棋';
    statusEl.textContent = vsAI ? (currentPlayer===BLACK?'请落子':'电脑落子中...') : `${name}落子`;
    updateHistory(); updateUndoBtn();
  }

  function resetGame() {
    if (aiTimeoutId) { clearTimeout(aiTimeoutId); aiTimeoutId = null; }
    board=Array(SIZE).fill(null).map(()=>Array(SIZE).fill(EMPTY));
    currentPlayer=BLACK; gameOver=false; history=[]; lastMove=null;
    const svg=document.querySelector('#board-wrapper>svg');
    if(svg)svg.remove();
    statusEl.textContent = vsAI ? '请落子' : '⚫黑棋先行';
    init(); updateHistory(); updateUndoBtn();
  }

  resetBtn.addEventListener('click', resetGame);
  undoBtn.addEventListener('click', undo);

  init(); updateScores();
</script>
</body>
